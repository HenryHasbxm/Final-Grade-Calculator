<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Final Grade Calculator</h1>
        <p class="subtitle">Find out what you need on your final exam.</p>

        <div class="input-group">
            <label>Current Grade (%)</label>
            <input type="number" id="currentGrade" placeholder="e.g. 88" oninput="liveCalculate()">
        </div>

        <div class="input-group">
            <label>Target Grade (%)</label>
            <input type="number" id="targetGrade" placeholder="e.g. 90" oninput="liveCalculate()">
        </div>

        <div class="input-group">
            <label>Final Exam Weight (%)</label>
            <input type="number" id="finalWeight" placeholder="e.g. 20" oninput="liveCalculate()">
        </div>

        <div class="options">
            <label class="checkbox-container">
                <input type="checkbox" id="testCorrection" onchange="liveCalculate()">
                Enable Test Corrections (Half-credit back)
            </label>
        </div>

        <button class="calc-btn" onclick="showPopup()">Show Detailed Result</button>
        
        <div id="liveResult" class="live-text"></div>
    </div>

    <!-- The Popup Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
