<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Final Grade Calculator</h1>
        <p class="subtitle">Enter your details to calculate your required score.</p>

        <div class="input-group">
            <label>Current Grade (%)</label>
            <input type="number" id="currentGrade" placeholder="e.g. 88">
        </div>

        <div class="input-group">
            <label>Target Grade (%)</label>
            <input type="number" id="targetGrade" placeholder="e.g. 90">
        </div>

        <div class="input-group">
            <label>Final Exam Weight (%)</label>
            <input type="number" id="finalWeight" placeholder="e.g. 20">
        </div>

        <div class="options">
            <label class="checkbox-container">
                <input type="checkbox" id="testCorrection">
                Enable Test Corrections (Half-credit back)
            </label>
        </div>

        <button class="calc-btn" onclick="showPopup()">Calculate Final Grade</button>
    </div>

    <!-- The Satisfying Popup Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div id="modalBody">
                <!-- Content injected by JS -->
            </div>
            <button class="close-btn" onclick="closeModal()">Got it!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
