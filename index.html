<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Final Grade Calculator</h1>
        <p class="subtitle">Enter your grades to see your fate.</p>

        <div class="input-group">
            <label>Current Grade (%)</label>
            <input type="number" id="currentGrade" placeholder="e.g. 88">
        </div>

        <div class="input-group">
            <label>Target Grade (%)</label>
            <input type="number" id="targetGrade" placeholder="e.g. 90">
        </div>

        <div class="input-group">
            <label>Final Exam Weight (%)</label>
            <input type="number" id="finalWeight" placeholder="e.g. 20">
        </div>

        <button class="calc-btn" onclick="showPopup()">Calculate</button>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div id="modalBody"></div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
